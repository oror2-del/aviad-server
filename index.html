<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - SUPREME NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-darkest: #010409;
            --bg-deep-blue: #0a1931;
            --neon-blue: #00d2ff;
            --electric-blue: #1e56a0;
            --frozen-light: #e6f7ff;
            --led-white: #ffffff;
            --win-green: #00ff88;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-darkest);
            color: white; margin: 0; padding: 0;
            background-image: 
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 0%, transparent 10%, transparent 90%, rgba(0, 210, 255, 0.05) 100%),
                url('https://www.transparenttextures.com/patterns/hexellence.png'),
                radial-gradient(circle at center, var(--bg-deep-blue) 0%, var(--bg-darkest) 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        body::before {
            content: "⚽";
            position: fixed; top: 15%; right: -5%;
            font-size: 30vw; opacity: 0.02; z-index: -1;
            filter: blur(5px) sepia(1) saturate(5);
        }

        body::after {
            content: "🏀";
            position: fixed; bottom: 10%; left: -5%;
            font-size: 25vw; opacity: 0.02; z-index: -1;
            filter: blur(5px);
        }

        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(1, 4, 9, 0.9); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--electric-blue);
            padding: 20px 10px; display: flex; justify-content: center; gap: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid rgba(255,255,255,0.2);
            padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 800;
            transition: 0.3s; font-size: 1em; text-transform: uppercase;
        }

        .nav-btn.active { 
            background: linear-gradient(135deg, var(--neon-blue) 0%, var(--electric-blue) 100%);
            color: black; border-color: transparent;
            box-shadow: 0 0 25px var(--neon-blue); 
        }

        .header-section { text-align: center; padding: 60px 20px 40px 20px; position: relative; }
        
        .main-logo {
            font-family: 'Assistant', sans-serif; font-weight: 800; font-size: 5.5em;
            letter-spacing: -3px; color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px var(--neon-blue);
            display: block; line-height: 0.9;
        }

        .logo-subtext {
            font-family: 'Oswald', sans-serif;
            color: var(--neon-blue); font-size: 1.3em; letter-spacing: 12px;
            text-transform: uppercase; margin-top: 15px; display: block; opacity: 0.9;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        .game-card {
            background: rgba(10, 25, 49, 0.8);
            border: 2px solid var(--electric-blue);
            border-radius: 20px; padding: 30px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; position: relative;
            box-shadow: 0 0 25px rgba(30, 86, 160, 0.2);
            backdrop-filter: blur(10px);
        }

        .game-card::before {
            content: ''; position: absolute; left: 0; top: 15%; bottom: 15%; width: 5px;
            background: var(--neon-blue); border-radius: 0 5px 5px 0;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .card-info { flex-grow: 1; text-align: center; }
        .card-info h3 { margin: 10px 0; font-size: 2.2em; font-weight: 800; }
        .card-info p { color: var(--frozen-light); margin: 5px 0; font-size: 1em; }

        .amount-box {
            border: 3px solid var(--frozen-light); color: var(--frozen-light);
            padding: 15px 25px; border-radius: 15px; font-weight: 900; font-size: 1.8em;
            box-shadow: 0 0 25px rgba(230, 247, 255, 0.5);
            min-width: 90px; text-align: center;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active">הלוח</button>
    <button class="nav-btn">מעקב חי</button>
    <button class="nav-btn">שידורים</button>
    <button class="nav-btn">ארכיון</button>
</div>

<div class="header-section">
    <span class="main-logo">הטיפ היומי שלי</span>
    <span class="logo-subtext">AAA365 PRO SYSTEM</span>
</div>

<div class="container">
    <div class="game-card">
        <div style="font-size: 1.8em; opacity: 0.3;">💬</div>
        <div class="card-info">
            <h3 style="color: rgba(255,255,255,0.1);">ממתין להזנה...</h3>
            <p>שעה: --:-- | יחס: --</p>
        </div>
        <div class="amount-box" style="opacity: 0.1;">0</div>
    </div>
</div>

</body>
</html>
