<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - MY DAILY TIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --led-white: #ffffff;
            --bg-black: #050a0f;
            --win-green: #00ff88;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.08), transparent);
            background-attachment: fixed;
        }

        /* תפריט אליפסות קבוע */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 10px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 800; 
            transition: 0.3s; font-size: 0.9em;
        }

        .nav-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 25px var(--neon-blue); }

        /* לוגו הטיפ היומי שלי - עיצוב נקי וחדשני */
        .header-section { text-align: center; padding: 50px 20px 30px 20px; }
        .main-logo {
            font-size: 4em; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #aaa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: block; line-height: 1;
        }
        .logo-subtext { color: var(--neon-blue); font-size: 1.1em; letter-spacing: 8px; margin-top: 10px; display: block; opacity: 0.8; }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px 120px 15px; }

        /* שבלונת ה"בטון" המנצחת - העתק מדויק מהתמונה */
        .game-card {
            background: rgba(10, 15, 20, 0.95);
            border: 2px solid rgba(0, 210, 255, 0.3);
            border-radius: 15px; padding: 30px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
        }

        .card-left { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        .wa-icon { background: #25D366; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        .status-btn { background: #222; color: #555; padding: 5px 12px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }

        .card-info { flex-grow: 1; text-align: center; padding: 0 20px; }
        .card-info small { color: var(--win-green); font-weight: bold; font-size: 0.8em; display: block; margin-bottom: 8px; }
        .card-info h3 { margin: 0; font-size: 2em; font-weight: 800; }
        .card-info p { margin: 5px 0; color: #888; font-size: 0.9em; }

        /* הריבוע הלבן הזוהר המדויק */
        .amount-box {
            border: 2px solid var(--led-white); color: var(--led-white);
            padding: 10px 18px; border-radius: 10px;
            font-weight: 900; font-size: 1.5em;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            min-width: 75px; text-align: center;
            background: rgba(255,255,255,0.05);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active">הלוח</button>
    <button class="nav-btn">מעקב חי</button>
    <button class="nav-btn">שידורים</button>
    <button class="nav-btn">ארכיון</button>
</div>

<div class="header-section">
    <span class="main-logo">הטיפ היומי שלי</span>
    <span class="logo-subtext">AAA365 PRO SYSTEM</span>
</div>

<div class="container">
    <div class="game-card">
        <div class="card-left">
            <div class="wa-icon">💬</div>
            <div class="status-btn">ממתין...</div>
        </div>
        <div class="card-info">
            <small>(THE ANCHOR) עוגן 📍</small>
            <h3>משחק טרם הוזן</h3>
            <p>שריקת פתיחה: --:-- | יחס: --</p>
        </div>
        <div class="amount-box">0</div>
    </div>
</div>

</body>
</html>
