<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - COMMAND CENTER</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --led-white: #ffffff;
            --bg-black: #050a0f;
            --win-green: #00ff88;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            background-image: 
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.08), transparent),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* תפריט עליון - אליפסות */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 10px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 800; 
            transition: 0.3s; font-size: 0.9em; text-transform: uppercase;
        }

        .nav-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 25px var(--neon-blue); }

        /* מחשבון תקציב */
        .budget-bar { padding: 15px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .budget-input {
            background: #000; border: 1.5px solid var(--neon-blue);
            color: var(--neon-blue); font-weight: bold; width: 100px; text-align: center;
            border-radius: 8px; font-size: 1.2em; padding: 5px;
        }

        .container { max-width: 850px; margin: 25px auto; padding: 0 15px; padding-bottom: 120px; }

        /* כרטיסיית המשחק - ה"בטון" המנצח מהתמונה */
        .main-game-card {
            background: rgba(10, 15, 20, 0.9);
            border: 2px solid rgba(0, 210, 255, 0.3);
            border-radius: 15px; padding: 25px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
        }

        .game-card-left { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        .copy-btn { background: #25D366; border: none; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2em; }
        .waiting-btn { background: #555; color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }

        .game-card-center { flex-grow: 1; text-align: center; padding: 0 20px; }
        .game-card-center small { color: var(--win-green); font-weight: bold; }
        .game-card-center h3 { margin: 10px 0; font-size: 1.8em; font-weight: 900; }
        .game-card-center p { margin: 5px 0; color: #aaa; font-size: 0.9em; }

        /* הריבוע הזוהר הקטן מהתמונה שאהבת */
        .amount-box-glowing {
            border: 2px solid var(--led-white); color: var(--led-white);
            padding: 10px 18px; border-radius: 10px;
            font-weight: 900; font-size: 1.4em;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            min-width: 70px; text-align: center;
        }

        /* הנקודות הצדדיות עם החיצים */
        .card-details { display: flex; flex-direction: column; gap: 8px; text-align: right; color: #888; font-size: 0.9em; }
        .detail-line { display: flex; align-items: center; justify-content: flex-end; gap: 5px; }

        /* קטגוריות מתקפלות */
        .shelf { border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid #1a1a1a; background: #0a0f14; }
        .shelf-header { background: rgba(255,255,255,0.03); padding: 18px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 900; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active">הלוח</button>
    <button class="nav-btn">מעקב חי</button>
    <button class="nav-btn">שידורים</button>
    <button class="nav-btn">ארכיון</button>
</div>

<div class="budget-bar">
    תקציב לניהול: <input type="number" class="budget-input" value="1000" id="dailyBudget" oninput="updateAmounts()"> ₪
</div>

<div class="container">
    <div>
        <div class="main-game-card">
            <div class="game-card-left">
                <button class="copy-btn">💬</button>
                <div class="waiting-btn">ממתין...</div>
            </div>

            <div class="game-card-center">
                <small>(THE ANCHOR) עוגן 📍</small>
                <h3>בוסטון סלטיקס - פילדלפיה</h3>
                <p>שריקת פתיחה: 02:30 | משחק מספר 5</p>
                
                <div class="card-details">
                    <div class="detail-line">סימון: 1- (8.5-) ➔</div>
                    <div class="detail-line">יחס: 1.65 📈</div>
                    <div class="detail-line">מדד ביטחון: 94% 📊</div>
                </div>
            </div>

            <div class="amount-box-glowing" data-ratio="0.143">143</div>
        </div>

        <div class="shelf">
            <div class="shelf-header">⚽ Soccer Elite <span>▼</span></div>
        </div>
        <div class="shelf">
            <div class="shelf-header">🎾 Tennis Masters <span>▼</span></div>
        </div>
    </div>
</div>

<script>
    function updateAmounts() {
        const budget = document.getElementById('dailyBudget').value;
        document.querySelectorAll('.amount-box-glowing').forEach(box => {
            const ratio = box.getAttribute('data-ratio');
            box.innerText = Math.floor(budget * ratio);
        });
    }
    updateAmounts();
</script>

</body>
</html>
