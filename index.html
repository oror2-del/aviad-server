<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - SUPREME COMMAND</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --win-green: #00ff88;
            --gold: #ffd700;
            --bg-black: #050a0f;
            --tennis-orange: #ffaa00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent),
                              url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
        }

        /* תפריט עליון - תיקון לחצנים */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 10px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 25px; border-radius: 50px; cursor: pointer;
            font-weight: 800; transition: 0.3s; font-size: 0.9em;
            display: inline-block; width: auto;
        }

        .nav-btn.active { 
            background: var(--neon-blue); color: black; 
            box-shadow: 0 0 25px var(--neon-blue); 
        }

        /* לוגו הטיפ היומי */
        .daily-tip-header { text-align: center; padding: 30px 20px; }
        .logo-text {
            font-size: 3.5em; font-weight: 900; text-transform: uppercase;
            letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px var(--gold);
        }

        /* תקציב */
        .budget-section { padding: 10px; text-align: center; }
        .budget-input {
            background: rgba(0,0,0,0.5); border: 2px solid var(--neon-blue);
            color: var(--neon-blue); font-weight: bold; width: 130px;
            text-align: center; border-radius: 12px; font-size: 1.5em; padding: 10px;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }

        /* שבלונת קטגוריה */
        .shelf {
            border-radius: 15px; margin-bottom: 25px; overflow: hidden;
            background: rgba(15, 20, 25, 0.9); border: 1.5px solid rgba(255,255,255,0.1);
        }
        .shelf-header {
            padding: 22px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; font-weight: 900; font-size: 1.3em;
            background: rgba(255,255,255,0.03);
        }

        .shelf-nba { border-color: var(--neon-blue); }
        .shelf-soccer { border-color: var(--win-green); }
        .shelf-tennis { border-color: var(--tennis-orange); }
        .shelf-gold { border-color: var(--gold); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 25px var(--gold); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }

        .hidden { display: none; }
        .tab-content { display: block; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active" onclick="switchTab('board')">הלוח</button>
    <button class="nav-btn" onclick="switchTab('live')">מעקב חי</button>
    <button class="nav-btn" onclick="switchTab('tv')">שידורים</button>
    <button class="nav-btn" onclick="switchTab('archive')">ארכיון</button>
</div>

<div id="tab-board" class="tab-content">
    <div class="daily-tip-header">
        <span class="logo-text">הטיפ היומי</span>
    </div>

    <div class="budget-section">
        <input type="number" class="budget-input" value="1000">
    </div>

    <div class="container">
        <div class="shelf shelf-gold">
            <div class="shelf-header" style="color: var(--gold);">
                <span>🌟 המלצת המערכת (חובה)</span>
                <span>▲</span>
            </div>
        </div>

        <div class="shelf shelf-nba">
            <div class="shelf-header"><span>🏀 NBA PLAYOFFS</span><span>▼</span></div>
        </div>

        <div class="shelf shelf-soccer">
            <div class="shelf-header"><span>⚽ SOCCER ELITE</span><span>▼</span></div>
        </div>

        <div class="shelf shelf-tennis">
            <div class="shelf-header"><span>🎾 TENNIS MASTERS</span><span>▼</span></div>
        </div>
    </div>
</div>

<div id="tab-live" class="tab-content hidden"><h2 style="text-align:center; padding:50px;">🎯 מעקב טפסים חי</h2></div>
<div id="tab-tv" class="tab-content hidden"><h2 style="text-align:center; padding:50px;">📺 לוח שידורים</h2></div>
<div id="tab-archive" class="tab-content hidden"><h2 style="text-align:center; padding:50px;">🏆 ארכיון זכיות</h2></div>

<script>
    // פונקציית מעבר טאבים חזקה
    function switchTab(id) {
        // הסתרת כל הדפים
        document.getElementById('tab-board').classList.add('hidden');
        document.getElementById('tab-live').classList.add('hidden');
        document.getElementById('tab-tv').classList.add('hidden');
        document.getElementById('tab-archive').classList.add('hidden');

        // הצגת הדף הנבחר
        document.getElementById('tab-' + id).classList.remove('hidden');

        // עדכון כפתור פעיל
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        
        // מוצא את הכפתור שנלחץ לפי הטקסט שלו או ה-onclick
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
