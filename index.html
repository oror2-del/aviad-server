<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - MY DAILY TIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --led-white: #ffffff;
            --bg-black: #050a0f;
            --win-green: #00ff88;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            background-image: 
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.08), transparent),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
        }

        /* תפריט אליפסות */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 10px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 800; 
            transition: 0.3s; font-size: 0.9em;
        }

        .nav-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 25px var(--neon-blue); }

        /* כותרת חדשנית - הטיפ היומי שלי */
        .header-section { text-align: center; padding: 40px 20px 20px 20px; }
        .main-logo {
            font-family: 'Assistant', sans-serif; font-weight: 800; font-size: 4em;
            background: linear-gradient(to bottom, #fff 50%, #aaa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: block; line-height: 1;
        }
        .logo-subtext {
            font-family: 'Oswald', sans-serif; color: var(--neon-blue);
            font-size: 1.1em; letter-spacing: 8px; margin-top: 10px; display: block; opacity: 0.8;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px 120px 15px; }

        /* כרטיסיית ה"בטון" - העתק מדויק מהתמונה */
        .main-game-card {
            background: rgba(10, 15, 20, 0.9);
            border: 2px solid rgba(0, 210, 255, 0.3);
            border-radius: 15px; padding: 25px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
        }

        .game-card-left { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        .copy-btn { background: #25D366; border: none; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .waiting-btn { background: #333; color: #888; padding: 5px 12px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }

        .game-card-center { flex-grow: 1; text-align: center; padding: 0 20px; }
        .game-card-center small { color: var(--win-green); font-weight: bold; font-size: 0.8em; }
        .game-card-center h3 { margin: 10px 0; font-size: 1.8em; font-weight: 900; }
        .game-card-center p { margin: 5px 0; color: #aaa; font-size: 0.9em; }

        /* הריבוע הזוהר הלבן מהתמונה */
        .amount-box-glowing {
            border: 2px solid var(--led-white); color: var(--led-white);
            padding: 10px 18px; border-radius: 10px;
            font-weight: 900; font-size: 1.4em;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            min-width: 70px; text-align: center;
        }

        .card-details { display: flex; flex-direction: column; gap: 5px; text-align: right; color: #666; font-size: 0.85em; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active">הלוח</button>
    <button class="nav-btn">מעקב חי</button>
    <button class="nav-btn">שידורים</button>
    <button class="nav-btn">ארכיון</button>
</div>

<div class="header-section">
    <span class="main-logo">הטיפ היומי שלי</span>
    <span class="logo-subtext">AAA365 ALGORITHM</span>
</div>

<div class="container">
    <div class="main-game-card">
        <div class="game-card-left">
            <button class="copy-btn">💬</button>
            <div class="waiting-btn">ממתין...</div>
        </div>

        <div class="game-card-center">
            <small>(THE ANCHOR) עוגן 📍</small>
            <h3 style="color: #444;">משחק טרם הוזן</h3>
            <p>שריקת פתיחה: --:-- | משחק מספר --</p>
            
            <div class="card-details">
                <div>סימון: -- ➔</div>
                <div>יחס: -- 📈</div>
            </div>
        </div>

        <div class="amount-box-glowing">0</div>
    </div>
</div>

</body>
</html>
