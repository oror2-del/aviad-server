<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - COMMAND CENTER</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --led-white: #ffffff;
            --bg-black: #050a0f;
            --win-green: #00ff88;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
            background-attachment: fixed;
        }

        /* תפריט עליון - אליפסות נקיות */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 10px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 800; 
            font-size: 0.9em;
        }

        .nav-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 25px var(--neon-blue); }

        /* כותרת חדשנית - הטיפ היומי שלי */
        .header-main { text-align: center; padding: 40px 20px; }
        .logo-text {
            font-size: 3.5em; font-weight: 900; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            display: block; margin-bottom: 5px;
        }
        .logo-sub { color: var(--neon-blue); letter-spacing: 5px; font-size: 1.1em; opacity: 0.8; }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px 100px 15px; }

        /* כרטיסיית ה"בטון" המדויקת מהתמונה */
        .game-card-main {
            background: rgba(10, 15, 20, 0.95);
            border: 2.5px solid var(--neon-blue);
            border-radius: 15px; padding: 30px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; position: relative;
        }

        .side-icons { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        .wa-btn { background: #25D366; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
        .status-tag { background: #222; color: #666; padding: 4px 10px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }

        .game-info { flex-grow: 1; text-align: center; padding: 0 20px; }
        .game-info small { color: var(--win-green); font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 10px; }
        .game-info h3 { margin: 0; font-size: 2em; font-weight: 900; letter-spacing: -1px; }
        .game-info p { margin: 8px 0; color: #888; font-size: 0.95em; }

        .details-list { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; margin-top: 15px; }
        .detail-item { color: #666; font-size: 0.9em; font-weight: bold; }

        /* הריבוע הלבן הזוהר - הלב של העיצוב */
        .glowing-square {
            border: 3px solid #fff; color: #fff;
            padding: 12px 20px; border-radius: 12px;
            font-weight: 900; font-size: 1.6em;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            min-width: 80px; text-align: center;
            background: rgba(255,255,255,0.05);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active">הלוח</button>
    <button class="nav-btn">מעקב חי</button>
    <button class="nav-btn">שידורים</button>
    <button class="nav-btn">ארכיון</button>
</div>

<div class="header-main">
    <span class="logo-text">הטיפ היומי שלי</span>
    <span class="logo-sub">AAA365 ALGORITHM</span>
</div>

<div class="container">
    <div class="game-card-main">
        <div class="side-icons">
            <div class="wa-btn">💬</div>
            <div class="status-tag">ממתין...</div>
        </div>

        <div class="game-info">
            <small>(THE ANCHOR) עוגן 📍</small>
            <h3>בוסטון סלטיקס - פילדלפיה</h3>
            <p>שריקת פתיחה: 02:30 | משחק מספר 5</p>
            
            <div class="details-list">
                <div class="detail-item">סימון: 1- (8.5-) ➔</div>
                <div class="detail-item">יחס: 1.65 📈</div>
            </div>
        </div>

        <div class="glowing-square">143</div>
    </div>
</div>

</body>
</html>
