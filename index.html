<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - SUPREME COMMAND</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --led-white: #ffffff;
            --bg-black: #050a0f;
            --win-green: #00ff88;
            --tennis-orange: #ffaa00;
            --gold: #ffd700;
            --pulse-red: #ff4b2b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            /* רקע עם אלמנטים גרפיים */
            background-image: 
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
        }

        /* אלמנטים דקורטיביים ברקע */
        body::before {
            content: "⚽ 🏀 🎾";
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20vw; opacity: 0.02; z-index: -1;
            filter: grayscale(1) brightness(2);
        }

        /* תפריט עליון אליפטי */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 12px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 30px; border-radius: 50px;
            cursor: pointer; font-weight: 800; transition: 0.4s;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .nav-btn.active { 
            background: var(--neon-blue); color: black; 
            box-shadow: 0 0 30px var(--neon-blue); 
        }

        /* עיצוב תקציב יוקרתי */
        .budget-bar {
            padding: 25px; text-align: center;
        }
        .budget-label {
            display: block; font-size: 1.4em; font-weight: 200; letter-spacing: 3px;
            margin-bottom: 10px; color: var(--led-white); text-shadow: 0 0 10px var(--neon-blue);
        }
        .budget-input {
            background: rgba(0,0,0,0.6); border: 2px solid var(--neon-blue);
            color: var(--neon-blue); font-weight: bold; width: 120px; text-align: center;
            border-radius: 12px; font-size: 1.5em; padding: 10px;
            box-shadow: inset 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px 120px 15px; }

        /* קטגוריות ניאון */
        .shelf { 
            border-radius: 20px; margin-bottom: 30px; overflow: hidden; 
            background: rgba(10, 15, 20, 0.8); border: 1.5px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .shelf-nba { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.15); }
        .shelf-soccer { border-color: var(--win-green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
        .shelf-tennis { border-color: var(--tennis-orange); box-shadow: 0 0 20px rgba(255, 170, 0, 0.15); }
        
        /* קטגוריית הזהב עם דופק */
        .shelf-gold { 
            border: 2px solid var(--gold); 
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 10px var(--gold); }
            50% { box-shadow: 0 0 30px var(--gold); }
            100% { box-shadow: 0 0 10px var(--gold); }
        }

        .shelf-header {
            padding: 22px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; font-weight: 900; font-size: 1.3em;
            background: rgba(255,255,255,0.03);
        }

        /* אייקוני ניאון טקסטואליים */
        .neon-icon {
            font-size: 0.8em; color: var(--led-white);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            margin-left: 15px; font-style: normal;
        }

        .game-card {
            padding: 22px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
        }

        .amount-box {
            border: 2px solid var(--led-white); color: var(--led-white);
            padding: 8px 16px; border-radius: 10px; font-weight: 900;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            min-width: 65px; text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn active" onclick="showTab('board')">הלוח</button>
    <button class="nav-btn" onclick="showTab('live')">מעקב חי</button>
    <button class="nav-btn" onclick="showTab('tv')">שידורים</button>
    <button class="nav-btn" onclick="showTab('archive')">ארכיון</button>
</div>

<div class="budget-bar">
    <span class="budget-label">תקציב פעיל</span>
    <input type="number" class="budget-input" value="1000" id="dailyBudget" oninput="updateAmounts()">
</div>

<div class="container" id="mainContent">
    <div class="shelf shelf-nba">
        <div class="shelf-header" onclick="toggleShelf('nba')">
            <span><i class="neon-icon">NBA</i> Playoff Center</span>
            <span>▼</span>
        </div>
        <div id="nba-content" class="hidden">
            <div class="game-card">
                <div style="flex-grow:1; text-align:right;">
                    <div style="font-weight:bold; font-size:1.1em;">בוסטון - פילדלפיה</div>
                    <div style="color:#888; font-size:0.9em;">02:30 | סימון: 1-</div>
                </div>
                <div class="amount-box" data-ratio="0.143">143</div>
            </div>
        </div>
    </div>

    <div class="shelf shelf-soccer">
        <div class="shelf-header" onclick="toggleShelf('soccer')">
            <span><i class="neon-icon">SOCCER</i> Elite Leagues</span>
            <span>▼</span>
        </div>
        <div id="soccer-content" class="hidden">
            <div class="game-card">
                <div style="flex-grow:1; text-align:right;">
                    <div style="font-weight:bold; font-size:1.1em;">פ.ס.ז' - באיירן מינכן</div>
                    <div style="color:#888; font-size:0.9em;">22:00 | סימון: Over 3.5</div>
                </div>
                <div class="amount-box" data-ratio="0.143">143</div>
            </div>
        </div>
    </div>

    <div class="shelf shelf-tennis">
        <div class="shelf-header" onclick="toggleShelf('tennis')">
            <span><i class="neon-icon">TENNIS</i> ATP Madrid</span>
            <span>▼</span>
        </div>
        <div id="tennis-content" class="hidden">
            <div class="game-card">
                <div style="flex-grow:1; text-align:right;">
                    <div style="font-weight:bold; font-size:1.1em;">יאניק סינר - חצ'אנוב</div>
                    <div style="color:#888; font-size:0.9em;">בוקר | סימון: 1</div>
                </div>
                <div class="amount-box" data-ratio="0.120">120</div>
            </div>
        </div>
    </div>

    <div class="shelf shelf-gold">
        <div class="shelf-header" onclick="toggleShelf('gold')">
            <span style="color:var(--gold);"><i class="neon-icon" style="text-shadow:0 0 10px var(--gold)">GOLD</i> טופס חובה (Must-Play)</span>
            <span>▼</span>
        </div>
        <div id="gold-content">
            <div class="game-card" style="background:rgba(255,215,0,0.05);">
                <div style="flex-grow:1; text-align:right;">
                    <div style="font-weight:bold; color:var(--gold);">הקומבו המנצח של האלגוריתם</div>
                    <div style="color:#ccc; font-size:0.9em;">בוסטון + נדאל + פ.ס.ז' (1X)</div>
                </div>
                <div class="amount-box" style="border-color:var(--gold); color:var(--gold); box-shadow:0 0 15px var(--gold);" data-ratio="0.250">250</div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleShelf(id) {
        const content = document.getElementById(id + '-content');
        content.classList.toggle('hidden');
    }

    function showTab(tabId) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function updateAmounts() {
        const budget = document.getElementById('dailyBudget').value;
        document.querySelectorAll('.amount-box').forEach(box => {
            const ratio = box.getAttribute('data-ratio');
            box.innerText = Math.floor(budget * ratio);
        });
    }
    updateAmounts();
</script>
</body>
</html>
