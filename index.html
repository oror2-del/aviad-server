<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAA365 PRO - SUPREME COMMAND</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --win-green: #00ff88;
            --gold: #ffd700;
            --bg-black: #050a0f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-black);
            color: white; margin: 0; padding: 0;
            background-image: 
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
        }

        /* אלמנטים גרפיים ברקע */
        .bg-icon {
            position: fixed; font-size: 20vw; opacity: 0.03; z-index: -1;
            filter: sepia(1) saturate(3) brightness(1.2);
        }

        /* תפריט עליון אליפטי */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 15, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px 10px; display: flex; justify-content: center; gap: 10px;
        }

        .nav-btn {
            background: transparent; color: white; border: 2px solid var(--neon-blue);
            padding: 10px 25px; border-radius: 50px; cursor: pointer;
            font-weight: 800; transition: 0.3s; font-size: 0.9em;
        }

        .nav-btn.active { 
            background: var(--neon-blue); color: black; 
            box-shadow: 0 0 25px var(--neon-blue); 
        }

        /* לוגו הטיפ היומי - חדש! */
        .daily-tip-header {
            text-align: center;
            padding: 40px 20px;
            margin-top: 20px;
        }

        .logo-text {
            font-size: 3.5em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 
                0 0 10px var(--gold),
                0 0 20px var(--gold),
                0 0 40px #ffaa00;
            display: block;
            margin-bottom: 5px;
        }

        .logo-subtext {
            color: var(--gold);
            letter-spacing: 8px;
            font-size: 1.2em;
            font-weight: 300;
            opacity: 0.8;
        }

        /* תקציב */
        .budget-section { padding: 20px; text-align: center; }
        .budget-input {
            background: rgba(0,0,0,0.5); border: 2px solid var(--neon-blue);
            color: var(--neon-blue); font-weight: bold; width: 130px;
            text-align: center; border-radius: 12px; font-size: 1.5em; padding: 10px;
        }

        .container { max-width: 800px; margin: 0 auto; padding-bottom: 100px; }

        .shelf-template {
            border-radius: 15px; margin-bottom: 25px; overflow: hidden;
            background: rgba(15, 20, 25, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .shelf-header {
            padding: 20px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; font-weight: 900; background: rgba(255,255,255,0.03);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="bg-icon" style="top: 15%; right: -5%;">⚽</div>
<div class="bg-icon" style="bottom: 15%; left: -5%;">🏀</div>

<div class="top-nav">
    <button class="nav-btn active" onclick="showTab('board')">הלוח</button>
    <button class="nav-btn" onclick="showTab('live')">מעקב חי</button>
    <button class="nav-btn" onclick="showTab('tv')">שידורים</button>
    <button class="nav-btn" onclick="showTab('archive')">ארכיון</button>
</div>

<div class="daily-tip-header">
    <span class="logo-text">הטיפ היומי</span>
    <span class="logo-subtext">AAA365 ALGORITHM</span>
</div>

<div class="budget-section">
    <input type="number" class="budget-input" value="1000">
</div>

<div class="container">
    <div id="tab-board">
        <div class="shelf-template" style="border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);">
            <div class="shelf-header" style="color: var(--gold); font-size: 1.4em;">
                <span>🌟 המלצת המערכת</span>
                <span>▼</span>
            </div>
            <div style="padding: 20px; text-align: center; font-style: italic; color: #ccc;">
                כאן יופיע הנתון של הטיפ הכי חזק להיום...
            </div>
        </div>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-' + tabId).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>

</body>
</html>
